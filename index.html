<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>수능 주간 플래너</title>
    <link rel="icon" href="assets/img/favicon.ico" />
    <link href="assets/css/style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <header>
      <h1>스터디 플래너<small>WEEKLY STUDY PLANNER</small></h1>
      <div class="header-right">
        <button class="hdr-btn primary no-print" id="saveBtn">💾 저장</button>
        <button class="hdr-btn no-print" id="printBtn">🖨 인쇄</button>
        <div class="dday">
          <b id="ddayNum">D-?</b>
          <span>2027학년도 수능</span>
          <span>2026.11.19 (목)</span>
        </div>
      </div>
    </header>

    <!-- 주 선택 -->
    <div class="week-bar">
      <button class="week-nav no-print" id="prevWeek" aria-label="이전 주">
        ◀
      </button>
      <div class="week-label">
        <span id="weekRange"></span>
        <span class="week-badge" id="weekBadge"></span>
      </div>
      <button class="week-nav no-print" id="nextWeek" aria-label="다음 주">
        ▶
      </button>
      <button class="today-btn no-print" id="goToday">이번 주</button>
      <select
        class="week-select no-print"
        id="weekSelect"
        aria-label="보관된 주 선택"
      >
        <option value="">📁 보관된 주 보기</option>
      </select>
    </div>

    <!-- 이전 주 복사 안내 -->
    <div class="draft-notice no-print" id="draftNotice">
      <span class="msg"
        >📋 <b>지난주 시간표를 불러왔어요.</b> 그대로 쓰려면 저장, 새로 짜려면
        비우기. </span
      >
      <button class="draft-keep" id="draftKeep">이대로 저장</button>
      <button class="draft-clear" id="draftClear">비우고 새로 작성</button>
    </div>

    <section>
      <h2 class="tt-title">
        주간 시간표
        <span
          style="font-weight: 400; font-size: 0.75rem; color: var(--ink-soft)"
          >06:00 – 26:00 · 10분 단위</span
        >
      </h2>
      <div class="grid-wrap">
        <div class="grid-inner">
          <div class="day-header" id="dayHeader"></div>
          <div class="grid" id="grid"></div>
        </div>
      </div>
      <p class="hint no-print">
        빈 곳을 <b>누른 채 아래로 드래그</b>하면 여러 시간을 한 번에 선택할 수
        있어요. ◀ ▶ 로 주를 이동하면 각 주의 시간표가 따로 보관돼요.
      </p>
    </section>

    <section class="todo-section">
      <h2> 노트 </h2>
      <div class="todo-add no-print">
        <input
          type="text"
          id="todoInput"
          aria-label="노트 입력"
        />
        <button id="todoAddBtn">추가</button>
      </div>
      <ul class="todos" id="todoList"></ul>
      <div class="empty no-print" id="todoEmpty">
        이 주에 등록된 노트가 없어요. 입력해서 추가해 보세요.
      </div>
    </section>

    <p class="status no-print" id="status"></p>

    <!-- 편집 팝업 -->
    <div class="editor no-print" id="editor" role="dialog" aria-modal="true">
      <div class="editor-box">
        <h3 id="editorTitle">시간표 입력</h3>
        <div class="time-row">
          <select id="startSel" aria-label="시작 시간"></select>
          <span>→</span>
          <select id="endSel" aria-label="종료 시간"></select>
        </div>
        <input
          type="text"
          id="blockText"
          maxlength="40"
        />
        <div class="swatches" id="swatches"></div>
        <div class="editor-actions">
          <button class="btn-cancel" id="btnCancel">취소</button>
          <button class="btn-del" id="btnDel" style="display: none">
            삭제
          </button>
          <button class="btn-save" id="btnSave">저장</button>
        </div>
      </div>
    </div>

    <script src="assets/js/planner.js"></script>
  </body>
</html>
